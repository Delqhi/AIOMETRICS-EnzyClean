<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Patent Device Poster</title>
  <desc id="desc">Placeholder poster for guided patent 3D viewer.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#eef4ff"/>
      <stop offset="1" stop-color="#dfeafb"/>
    </linearGradient>
    <linearGradient id="shell" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f9fcff"/>
      <stop offset="1" stop-color="#d6e2f4"/>
