  </g>
  <g fill="#1d3d66" font-family="Segoe UI, sans-serif" font-size="26" font-weight="600">
    <text x="140" y="162">01 Sensor Head</text>
    <text x="905" y="288">02 Processing Core</text>
    <text x="158" y="546">03 Control Shell</text>
  </g>
  <g stroke="#355d8c" stroke-width="3" fill="none">
